worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Правильный MIME-тип для WebAssembly критичен для Compose
    types {
        application/wasm wasm;
    }

    server {
        listen 8888;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Раздача фронтенда
        location / {
            try_files $uri $uri/ /index.html;
            
            # Отключаем кэширование для index.html, чтобы всегда отдавать актуальную версию
            if ($uri = '/index.html') {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # Проксирование API на бэкенд
        location /api/v1/ {
            proxy_pass http://127.0.0.1:8080/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Проксирование Swagger (если нужно)
        location /swagger/ {
            proxy_pass http://127.0.0.1:8080/swagger/;
            proxy_set_header Host $host;
        }
    }
}