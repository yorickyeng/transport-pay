[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx/error.log
stdout_logfile=/var/log/nginx/access.log
priority=10

[program:api]
command=/app/transport-pay-api
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/api/error.log
stdout_logfile=/var/log/api/output.log
# Обязательно передаем пути к БД и миграциям
environment=DB_PATH="/app/transport_pay.db",MIGRATIONS_DIR="/app/migrations",GIN_MODE="release"
priority=20